# Google Cloud Build pipeline
#
# Substitution variables (set in Cloud Build trigger or via --substitutions):
#   _REGION          : e.g. asia-southeast1
#   _BACKEND_SERVICE : Cloud Run service name for backend  (e.g. lawbot-backend)
#   _FRONTEND_SERVICE: Cloud Run service name for frontend (e.g. lawbot-frontend)
#
# The backend Cloud Run URL is fetched dynamically after the backend deploy step
# so the frontend image can be built with the correct NEXT_PUBLIC_API_URL baked in.

substitutions:
  _REGION: asia-southeast1
  _BACKEND_SERVICE: lawbot-backend
  _FRONTEND_SERVICE: lawbot-frontend

steps:
  # ── Step 1: Build backend image ────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-backend
    args:
      - build
      - -t
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/lawbot/${_BACKEND_SERVICE}:latest
      - -f
      - Dockerfile.backend
      - .

  # ── Step 2: Push backend image ─────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-backend
    waitFor: [build-backend]
    args:
      - push
      - --all-tags
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/lawbot/${_BACKEND_SERVICE}

  # ── Step 3: Deploy backend to Cloud Run ────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-backend
    waitFor: [push-backend]
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy ${_BACKEND_SERVICE} \
          --image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/lawbot/${_BACKEND_SERVICE}:latest \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --port=8000 \
          --memory=2Gi \
          --cpu=2 \
          --min-instances=0 \
          --max-instances=3 \
          --timeout=300 \
          --set-secrets=TYPHOON_API_KEY=TYPHOON_API_KEY:latest,SMTP_PASSWORD=SMTP_PASSWORD:latest,ANALYTICS_ADMIN_KEY=ANALYTICS_ADMIN_KEY:latest,SMTP_EMAIL=SMTP_EMAIL:latest \
          --set-env-vars=SMTP_HOST=smtp.gmail.com,SMTP_PORT=587,ANALYTICS_EXPORT_RETENTION_DAYS=30 \
          --set-env-vars=CHROMA_DIR=/app/data/chroma_unified \
          --add-volume=name=lawbot-data,type=cloud-storage,bucket=lawbot-data-$PROJECT_ID \
          --add-volume-mount=volume=lawbot-data,mount-path=/app/data/analytics \
          --set-env-vars=ANALYTICS_DB_PATH=/app/data/analytics/usage.sqlite3,OTP_DB_PATH=/app/data/analytics/otp.sqlite3

  # ── Step 4: Fetch backend URL ───────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: get-backend-url
    waitFor: [deploy-backend]
    entrypoint: bash
    args:
      - -c
      - |
        URL=$$(gcloud run services describe ${_BACKEND_SERVICE} \
          --region=${_REGION} --format="value(status.url)")
        echo "Backend URL: $$URL"
        echo $$URL > /workspace/backend_url.txt

  # ── Step 5: Build frontend image (bakes backend URL in) ────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build-frontend
    waitFor: [get-backend-url]
    entrypoint: bash
    args:
      - -c
      - |
        BACKEND_URL=$$(cat /workspace/backend_url.txt)
        docker build \
          --build-arg NEXT_PUBLIC_API_URL=$$BACKEND_URL \
          -t asia-southeast1-docker.pkg.dev/$PROJECT_ID/lawbot/${_FRONTEND_SERVICE}:latest \
          -f Dockerfile.frontend .

  # ── Step 6: Push frontend image ────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push-frontend
    waitFor: [build-frontend]
    args:
      - push
      - --all-tags
      - asia-southeast1-docker.pkg.dev/$PROJECT_ID/lawbot/${_FRONTEND_SERVICE}

  # ── Step 7: Deploy frontend to Cloud Run ───────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy-frontend
    waitFor: [push-frontend]
    entrypoint: bash
    args:
      - -c
      - |
        BACKEND_URL=$$(cat /workspace/backend_url.txt)
        gcloud run deploy ${_FRONTEND_SERVICE} \
          --image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/lawbot/${_FRONTEND_SERVICE}:latest \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --port=3000 \
          --memory=512Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=3 \
          --set-env-vars=NEXT_PUBLIC_API_URL=$$BACKEND_URL

images:
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/lawbot/${_BACKEND_SERVICE}:latest
  - asia-southeast1-docker.pkg.dev/$PROJECT_ID/lawbot/${_FRONTEND_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
